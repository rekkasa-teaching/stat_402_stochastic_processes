project:
  type: book
  output-dir: ../docs/notes

book:
  title: "Στοχαστικές διαδικασίες"
  subtitle: "STAT402"
  author: "Αλέξανδρος Ρέκκας"
  chapters:
    - index.qmd
    - chapter-01.qmd
    - chapter-02.qmd

format:
  html:
    theme: cosmo
    toc: true
    toc-title: "Περιεχόμενα"
  pdf:
    pdf-engine: xelatex
    toc: true
    toc-title: "Περιεχόμενα"
    mainfont: "DejaVu Serif"
    sansfont: "DejaVu Sans"
    monofont: "DejaVu Sans Mono"
    fontsize: 12pt
    geometry: "margin=2.5cm"
    babel-lang: "none"
    include-in-header:
      text: |
        \usepackage{polyglossia}
        \AtBeginDocument{\renewcommand{\contentsname}{Περιεχόμενα}}
        \setmainlanguage{greek}
        \setotherlanguage{english}
        \usepackage{xcolor}
        \usepackage{fancyhdr}
        \usepackage{hyperref}
        \usepackage{graphicx}
        \usepackage{tikz}
        \usepackage{tcolorbox}
        \tcbuselibrary{theorems, skins, breakable}

        % --- Colors ---
        \definecolor{sectioncolor}{HTML}{1A1A1A}
        \definecolor{rulecolor}{HTML}{A0A0A0}
        \definecolor{headercolor}{HTML}{777777}

        % --- Section heading style (KOMA-compatible) ---
        \setkomafont{section}{\color{sectioncolor}\large\bfseries}
        \renewcommand{\sectionlinesformat}[4]{%
          #3#4\par\nobreak\vspace{0.4ex}%
          {\color{rulecolor}\rule{\linewidth}{0.4pt}}%
          \vspace{-0.8ex}%
        }
        \RedeclareSectionCommand[
          beforeskip=2ex,
          afterskip=1.5ex
        ]{section}

        % --- Header/Footer ---
        \pagestyle{fancy}
        \fancyhf{}
        \renewcommand{\headrulewidth}{0pt}
        \fancyhead[R]{\small\itshape\color{headercolor}Στοχαστικές διαδικασίες}
        \fancyfoot[C]{\small\color{headercolor}\thepage}

        % --- Definition box ---
        \newtcbtheorem[number within=chapter]{definition}{Ορισμός}{
          enhanced,
          breakable,
          colback=white,
          colframe=black!70,
          fonttitle=\bfseries,
          separator sign={ ---},
          attach boxed title to top left={yshift=-2mm, xshift=4mm},
          boxed title style={colback=black!70, coltext=white}
        }{def}

        % --- Theorem box ---
        \newtcbtheorem[number within=chapter]{theorem}{Θεώρημα}{
          enhanced,
          breakable,
          colback=white,
          colframe=black!40,
          boxrule=0.8pt,
          fonttitle=\bfseries,
          separator sign={ ---},
          attach boxed title to top left={yshift=-2mm, xshift=4mm},
          boxed title style={colback=black!40, coltext=white}
        }{thm}